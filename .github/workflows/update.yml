name: Tự động cập nhật Heatmap BTC
on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch: 

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Cai dat Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cai dat thu vien
        run: pip install requests

      - name: Chay Script
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }} 
        run: python scraper.py
